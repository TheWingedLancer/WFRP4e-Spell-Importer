name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get version from tag
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      - name: Update module.json with release version + URLs
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          REPO="${{ github.repository }}"
          jq --arg version "$VERSION" \
             --arg manifest "https://github.com/$REPO/releases/latest/download/module.json" \
             --arg download "https://github.com/$REPO/releases/download/v$VERSION/module.zip" \
             '.version = $version | .manifest = $manifest | .download = $download' \
             module.json > module.tmp.json
          mv module.tmp.json module.json
          cat module.json

      - name: Create module.zip
        run: |
          zip -r module.zip \
            module.json \
            README.md \
            LICENSE \
            scripts \
            styles \
            templates \
            languages \
            packs \
            examples \
            -x "*.DS_Store" "*/.git/*"

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            module.json
            module.zip
          generate_release_notes: true
